<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carousel Translator Settings</title>
    <style>
      body {
        margin: 0;
        font-family: Segoe UI, system-ui, sans-serif;
        background: #f5f7fb;
        color: #0f172a;
      }

      main {
        max-width: 680px;
        margin: 36px auto;
        background: #ffffff;
        border: 1px solid #dbe4f0;
        border-radius: 14px;
        padding: 24px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 22px;
      }

      p {
        margin-top: 0;
        color: #3a4759;
      }

      .field {
        display: grid;
        gap: 8px;
        margin-top: 16px;
      }

      label {
        font-size: 13px;
        font-weight: 600;
      }

      select {
        width: 100%;
        max-width: 320px;
        font-size: 14px;
        border: 1px solid #b8c7db;
        border-radius: 10px;
        padding: 8px 10px;
      }

      button {
        margin-top: 14px;
        border: 0;
        border-radius: 10px;
        background: #0a66c2;
        color: #ffffff;
        font-size: 14px;
        font-weight: 600;
        padding: 9px 16px;
        cursor: pointer;
      }

      button:hover {
        background: #084f97;
      }

      .status {
        margin-top: 10px;
        color: #14532d;
        min-height: 20px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Carousel Translator Settings</h1>
      <p>Select your preferred target language. Translation runs locally in your browser.</p>

      <div class="field">
        <label for="target-language">Target language</label>
        <select id="target-language"></select>
      </div>

      <button id="save-language" type="button">Save</button>
      <div class="status" id="status" aria-live="polite"></div>
    </main>
    <script type="module" src="./options.js"></script>
  </body>
</html>
